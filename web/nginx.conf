# Sirve la SPA y hace de proxy de la API hacia el servicio controlplane.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Content-Security-Policy de la GUI (defensa ante XSS/inyección):
    #  - script-src 'self': el bundle es un fichero externo con hash, sin inline.
    #  - style-src 'unsafe-inline': React Flow inyecta <style> en runtime.
    #  - connect-src 'self': la GUI solo llama a /v1 (mismo origen). Con OIDC,
    #    el instalador añade el origen del IdP aquí (ver deploy/web.yaml).
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; img-src 'self' data:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; frame-src https: http:; form-action 'self'" always;
    add_header X-Content-Type-Options "nosniff" always;

    # API del control plane (nombre de servicio en docker-compose).
    location /v1/ {
        proxy_pass http://controlplane:8080;
    }
    location = /healthz {
        proxy_pass http://controlplane:8080;
    }

    # SPA: cualquier ruta desconocida devuelve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
