# Despliegue del CONTROL PLANE de Atlas dentro de Kubernetes.
#
#   kubectl apply -f deploy/controlplane.yaml
#
# Antes:
#   - construye y publica la imagen (Dockerfile, target 'controlplane').
#   - ajusta la imagen y, en producción, ATLAS_CORS_ORIGIN y el Ingress.
#
# El control plane NO habla con la API de Kubernetes: solo sirve HTTP (registro
# de agentes, topología, métricas). Por eso no necesita RBAC ni ServiceAccount
# con permisos. Los agentes marcan HACIA él (conexión saliente).
---
apiVersion: v1
kind: Namespace
metadata:
  name: atlas-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-controlplane
  namespace: atlas-system
  labels: { app: atlas-controlplane }
spec:
  # Con el store en memoria (por defecto) usa 1 réplica. Con Postgres (ver env
  # comentado abajo) el estado se comparte y puedes subir replicas sin problema.
  replicas: 1
  selector:
    matchLabels: { app: atlas-controlplane }
  template:
    metadata:
      labels: { app: atlas-controlplane }
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532 # uid 'nonroot' de la imagen distroless (verificable)
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: controlplane
          # TODO: reemplaza por tu imagen publicada (Dockerfile target 'controlplane').
          image: ghcr.io/d4rksit3/atlas-controlplane:latest
          args: ["--addr", ":8080"]
          ports:
            - { name: http, containerPort: 8080 }
          env:
            # Origen permitido para la GUI. En producción, fíjalo a tu dominio
            # (p. ej. https://atlas.example.com) en vez de "*". El instalador
            # (scripts/install.sh) reemplaza esta línea con el dominio y, si se
            # pide, la config OIDC. Aplicado a mano, usa "*" (solo desarrollo).
            - name: ATLAS_CORS_ORIGIN
              value: "*" # ATLAS_ENV_INJECT
            # Login local integrado (usuario/contraseña de Atlas). El instalador
            # crea el Secret atlas-auth con una contraseña generada y la clave de
            # sesión. Sin el Secret (optional) la GUI queda SIN login: solo dev.
            - name: ATLAS_ADMIN_USER
              valueFrom: { secretKeyRef: { name: atlas-auth, key: adminUser, optional: true } }
            - name: ATLAS_ADMIN_PASSWORD
              valueFrom: { secretKeyRef: { name: atlas-auth, key: adminPassword, optional: true } }
            - name: ATLAS_SESSION_KEY
              valueFrom: { secretKeyRef: { name: atlas-auth, key: sessionKey, optional: true } }
            # Persistencia + multi-réplica: descomenta para usar Postgres. Guarda
            # el DSN en un Secret (no en texto plano). Crea el Secret con:
            #   kubectl -n atlas-system create secret generic atlas-pg \
            #     --from-literal=dsn='postgres://user:pass@host:5432/atlas'
            # - name: ATLAS_STORE
            #   value: "postgres"
            # - name: ATLAS_POSTGRES_DSN
            #   valueFrom: { secretKeyRef: { name: atlas-pg, key: dsn } }
            # Auth de la GUI (OIDC + RBAC). Sin esto, la GUI NO pide login (dev).
            # Descomenta y apunta a tu IdP; 'operators' = quién puede escalar/reiniciar.
            # - name: ATLAS_OIDC_ISSUER
            #   value: "https://tu-idp.example.com"
            # - name: ATLAS_OIDC_CLIENT_ID
            #   value: "atlas-gui"
            # - name: ATLAS_RBAC_OPERATORS
            #   value: "ops@tu-dominio.com,platform-team"
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 20
          resources:
            requests: { cpu: "25m", memory: "32Mi" }
            limits: { cpu: "250m", memory: "128Mi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
---
apiVersion: v1
kind: Service
metadata:
  name: atlas-controlplane
  namespace: atlas-system
  labels: { app: atlas-controlplane }
spec:
  selector: { app: atlas-controlplane }
  ports:
    - { name: http, port: 8080, targetPort: http }
# ClusterIP: alcanzable dentro del clúster como
#   http://atlas-controlplane.atlas-system:8080
# Los agentes del MISMO clúster usan ese DNS. Los de OTROS entornos necesitan
# alcanzarlo desde fuera -> Ingress de abajo (con TLS).
---
