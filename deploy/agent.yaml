# Despliegue del agente de Atlas DENTRO de un clúster (modo kube, in-cluster).
#
#   kubectl apply -f deploy/agent.yaml
#
# Antes:
#   - construye y publica la imagen del agente (ver Dockerfile, target 'agent')
#   - ajusta ATLAS_CONTROL_PLANE y la imagen abajo.
#
# RBAC de mínimo privilegio: el agente SOLO lee nodos y cargas. No puede
# modificar nada en el clúster.
---
apiVersion: v1
kind: Namespace
metadata:
  name: atlas-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: atlas-agent
  namespace: atlas-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: atlas-agent-readonly
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods"]
    verbs: ["get", "list", "watch"]
  # Lectura de cargas + escritura acotada para ejecutar acciones de la GUI
  # (escalar = update; reiniciar = patch). No puede crear ni borrar cargas.
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch", "update", "patch"]
  # Proyectos GitOps (Applications de ArgoCD): leer + gestionar (registrar,
  # sincronizar, revertir). Es un permiso ACOTADO a este recurso — NO da acceso a
  # otros recursos. Instalar ArgoCD en sí (crear CRDs/roles) sigue necesitando el
  # RBAC amplio opt-in (deploy/agent-addons.yaml).
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Emisores TLS de cert-manager (crear un ClusterIssuer ACME/Let's Encrypt desde
  # la GUI). Permiso ACOTADO a este recurso — no da acceso a otros. Instalar
  # cert-manager en sí (crear sus CRDs) sigue necesitando el opt-in amplio
  # (deploy/agent-addons.yaml). La CRD clusterissuers aparece al instalarlo; la
  # regla se puede aplicar antes (referir un recurso aún inexistente es válido).
  - apiGroups: ["cert-manager.io"]
    resources: ["clusterissuers"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  # Publicar servicios desde la GUI: leer los Ingress (URLs del panel de
  # servicios) y crear/actualizar los "atlas-<service>". También lee Services
  # para validar que lo que se publica existe. Sin permiso de borrado.
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: atlas-agent-readonly
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: atlas-agent-readonly
subjects:
  - kind: ServiceAccount
    name: atlas-agent
    namespace: atlas-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-agent
  namespace: atlas-system
  labels: { app: atlas-agent }
spec:
  replicas: 1
  selector:
    matchLabels: { app: atlas-agent }
  template:
    metadata:
      labels: { app: atlas-agent }
    spec:
      serviceAccountName: atlas-agent
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532 # uid 'nonroot' de la imagen distroless (verificable)
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: agent
          # TODO: reemplaza por tu imagen publicada (Dockerfile target 'agent').
          image: ghcr.io/atlasctl/atlas-agent:latest
          args:
            - "--collector=kube"       # lee este clúster real (in-cluster)
            - "--transport=grpc"       # stream bidireccional: órdenes al instante
            - "--name=$(CLUSTER_NAME)"
            - "--provider=$(PROVIDER)"
            # Conexiones reales entre servicios (requiere Cilium + Hubble Relay).
            # Descomenta para poblar los enlaces del mapa desde Hubble:
            # - "--links=hubble"
            # - "--hubble-server=hubble-relay.kube-system:80"
          env:
            # Caché escribible para Helm (readOnlyRootFilesystem): sin esto,
            # instalar complementos por chart falla al bajar el repo/chart.
            - name: HELM_CACHE_HOME
              value: "/helm/cache"
            - name: HELM_CONFIG_HOME
              value: "/helm/config"
            - name: HELM_DATA_HOME
              value: "/helm/data"
            # A dónde marca hacia casa el agente (conexión saliente).
            - name: ATLAS_CONTROL_PLANE
              value: "https://atlas-controlplane.example.com"
            - name: CLUSTER_NAME
              value: "mi-cluster"
            - name: PROVIDER
              value: "onprem"          # onprem | aws | oci
          volumeMounts:
            - { name: helm-cache, mountPath: /helm }
          resources:
            requests: { cpu: "25m", memory: "64Mi" }
            # El límite da holgura para RENDERIZAR charts de Helm grandes
            # (kube-prometheus-stack ~cientos de MiB al plantillar; con 128Mi el
            # agente muere OOMKilled a mitad de instalación). Si no usas el
            # catálogo de complementos puedes bajarlo a 128Mi.
            limits:   { cpu: "500m", memory: "512Mi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
      volumes:
        - { name: helm-cache, emptyDir: {} }
